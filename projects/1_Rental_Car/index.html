<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header_wrap">
                <div class="header_logo"><img src="./img/logo.svg" alt="Logo"></div>
                <nav class="header_nav">
                    <ul class="header_navlist">
                        <li class="header_navitem"><a href="#">About</a></li>
                        <li class="header_navitem"><a href="#">Car</a></li>
                        <li class="header_navitem"><a href="#">Become Partner</a></li>
                        <li class="header_navitem"><a href="#">Terms & Conditions</a></li>
                        <li class="header_navitem"><a href="#">Contact us</a></li>
                    </ul>
            </div>
        </div>
    </header>
    <div class="section hero">
        <div class="container">
            <div class="hero_wrap">
                <div class="hero_content">
                    <h1>We Have Prepared a Car for Your Trip </h1>
                    <p>We have many types of cars that are ready for you to travel anywhere and anytime.</p>
                    <div class="buttonbox">
                        <div class="boxone">
                        <a class="hero_btn one" href="#">Get In Touch</a>
                    </div>
                    <div class="boxtwo">
                        <a class="hero_btn two" href="#">Our car</a>
                    </div>
                    </div>
                    <div class="hero_images">
                        <div class="hero_imagemap"><img src="./img/map.png" alt="Map Image" height="534px" width="856.39px"></div>
                        <div class="hero_imagecar"><img src="./img/car.png" alt="Car Image" height="454px" width="853px"></div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
